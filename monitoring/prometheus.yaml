apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: spotify-recommender
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: backend-health
        metrics_path: /health
        static_configs:
          - targets: ['backend-service:3001']

      - job_name: ml-service-health
        metrics_path: /health
        static_configs:
          - targets: ['ml-service:5000']

      - job_name: frontend-health
        metrics_path: /healthz
        static_configs:
          - targets: ['frontend-service:80']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: spotify-recommender
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          ports:
            - containerPort: 9090
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: spotify-recommender
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
