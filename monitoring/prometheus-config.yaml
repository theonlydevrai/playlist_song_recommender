global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: backend-health
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend-service:3001

  - job_name: ml-service-health
    metrics_path: /metrics
    static_configs:
      - targets:
          - ml-service:5000

  - job_name: frontend-health
    metrics_path: /metrics
    static_configs:
      - targets:
          - frontend-service:80

  - job_name: kube-state-metrics
    metrics_path: /metrics
    static_configs:
      - targets:
          - kube-state-metrics:8080

alerts.yml: |
  groups:
    - name: spotify-demo-alerts
      rules:
        - alert: PodDown
          expr: up == 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "A monitored service is down"
            description: "One of the scraped endpoints is not responding."

        - alert: HighCPU
          expr: rate(process_cpu_seconds_total{job=~"backend-health|ml-service-health"}[1m]) > 0.20
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage detected"
            description: "A backend or ML service process is using elevated CPU."
