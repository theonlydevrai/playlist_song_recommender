apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: spotify-recommender
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: spotify-recommender
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: Spotify DevOps
        orgId: 1
        folder: Spotify Demo
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: spotify-recommender
data:
  spotify-devops-dashboard.json: |
    {
      "uid": "spotify-devops",
      "title": "Spotify DevOps Demo",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "templating": { "list": [] },
      "panels": [
        {
          "type": "timeseries",
          "title": "Backend CPU",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(process_cpu_seconds_total{job=\"backend-health\"}[1m])", "refId": "A" }
          ]
        },
        {
          "type": "timeseries",
          "title": "ML CPU",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(process_cpu_seconds_total{job=\"ml-service-health\"}[1m])", "refId": "A" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Backend Request Rate",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            { "expr": "sum(rate(backend_http_requests_total[1m]))", "refId": "A" }
          ]
        },
        {
          "type": "timeseries",
          "title": "ML Request Rate",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            { "expr": "sum(rate(ml_service_requests_total[1m]))", "refId": "A" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Backend Memory",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            { "expr": "process_resident_memory_bytes{job=\"backend-health\"}", "refId": "A" }
          ]
        },
        {
          "type": "timeseries",
          "title": "ML Memory",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [
            { "expr": "process_resident_memory_bytes{job=\"ml-service-health\"}", "refId": "A" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod Count",
          "gridPos": { "x": 0, "y": 24, "w": 24, "h": 8 },
          "targets": [
            { "expr": "count(kube_pod_info{namespace=\"spotify-recommender\"})", "refId": "A" }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: spotify-recommender
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana-oss:11.2.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboards-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: spotify-recommender
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30031
