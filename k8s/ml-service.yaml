apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service-deployment
  namespace: spotify-recommender
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: spotify-ml-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: ml-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: spotify-recommender
spec:
  type: NodePort
  selector:
    app: ml-service
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30002
