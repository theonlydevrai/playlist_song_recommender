apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: spotify-recommender
data:
  PORT: "3001"
  NODE_ENV: "production"
  FRONTEND_URL: "http://localhost:30000"
  ML_SERVICE_URL: "http://ml-service:5000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ml-config
  namespace: spotify-recommender
data:
  PORT: "5000"
  DEBUG: "False"
---
apiVersion: v1
kind: Secret
metadata:
  name: spotify-secrets
  namespace: spotify-recommender
type: Opaque
stringData:
  SPOTIFY_CLIENT_ID: "replace_with_spotify_client_id"
  SPOTIFY_CLIENT_SECRET: "replace_with_spotify_client_secret"
  GEMINI_API_KEY: "replace_with_gemini_api_key"
